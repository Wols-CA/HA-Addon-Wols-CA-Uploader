name: "Wols CA MQTT Automation Uploader"
version: "0.7.3"
slug: "wols_ca_uploader"
description: "Dual-Broker Secure Vault & DMZ Bridge for Wols CA C++ services"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
# --- WOLS CA INGRESS SETTINGS ---
webui: "http://[HOST]:[PORT:8099]/"
ingress: true
ingress_port: 8099
panel_icon: mdi:security
panel_title: "a Wols CA System"
# --------------------------------
options:
  # Externe Broker (EMQX - Zero Trust)
  mqtt_ext_broker: ""
  mqtt_ext_port: 1883
  mqtt_ext_user: ""
  mqtt_ext_password: ""
  # Interne Broker (Home Assistant Mosquitto - Safe Zone)
  mqtt_int_broker: "core-mosquitto"
  mqtt_int_port: 1883
  mqtt_int_user: "addons"
  mqtt_int_password: ""
  
  WolsCA_Service_InstanceID: "WolsHub01"
  ConsoleToMqtt: false
  LogModus: "INFO"
  RefreshMinutes: 45
  TimeZone: "Europe/Amsterdam"
  ApiWhitelist: "127.0.0.1, ::1"
  SpotifyEnabled: false
  SpotifyAutomate: false
  PlaylistSets: 0
  SeaWaterEnabled: false
  SeaWaterNumber: 0
  SensorInterval: 30
schema:
  uploader_id: str?
  mqtt_ext_broker: str
  mqtt_ext_port: int
  mqtt_ext_user: str?
  mqtt_ext_password: password?
  mqtt_int_broker: str
  mqtt_int_port: int
  mqtt_int_user: str?
  mqtt_int_password: password?
  WolsCA_Service_InstanceID: str
  ConsoleToMqtt: bool
  LogModus: match(^(NOLOG|WARNING|ERROR|DEBUG|INFO)$)
  RefreshMinutes: int(40,55)
  TimeZone: str
  SpotifyEnabled: bool
  SpotifyAutomate: bool
  PlaylistSets: int(0,24)
  SeaWaterEnabled: bool
  SeaWaterNumber: int(0,100)
  SensorInterval: int(5,60)
map:
  - config:rw